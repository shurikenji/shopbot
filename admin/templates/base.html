<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin{% endblock %} — ShopBot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <!-- Sidebar -->
    <nav class="sidebar">
        <div class="brand">🤖 <span>ShopBot Admin</span></div>
        <a class="nav-link" href="/"><span class="icon">📊</span> <span>Dashboard</span></a>
        <a class="nav-link" href="/servers"><span class="icon">🖥</span> <span>Servers</span></a>
        <a class="nav-link" href="/categories"><span class="icon">📁</span> <span>Danh mục</span></a>
        <a class="nav-link" href="/products"><span class="icon">📦</span> <span>Sản phẩm</span></a>
        <a class="nav-link" href="/orders"><span class="icon">📋</span> <span>Đơn hàng</span></a>
        <a class="nav-link" href="/users"><span class="icon">👥</span> <span>Users</span></a>
        <a class="nav-link" href="/account-stock"><span class="icon">📦</span> <span>Kho Tài Khoản</span></a>
        <a class="nav-link" href="/settings"><span class="icon">⚙️</span> <span>Cài đặt</span></a>
        <a class="nav-link" href="/logs"><span class="icon">📜</span> <span>Logs</span></a>
        <a class="nav-link" href="/broadcast"><span class="icon">📢</span> <span>Broadcast</span></a>
        <hr style="border-color:rgba(255,255,255,0.1);margin:8px 20px">
        <a class="nav-link" href="/logout"><span class="icon">🚪</span> <span>Đăng xuất</span></a>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        {% if flash_message %}
        <div class="alert alert-{{ flash_type|default('info') }} alert-dismissible fade show" role="alert">
            {{ flash_message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
