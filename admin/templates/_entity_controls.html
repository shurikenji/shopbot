{% macro entity_state_badge(is_active) -%}
<span class="entity-state {{ 'entity-state--on' if is_active else 'entity-state--off' }}">
    <span class="entity-state__dot"></span>
    {{ 'Đang bật' if is_active else 'Tạm tắt' }}
</span>
{%- endmacro %}

{% macro entity_toggle_form(action, is_active, next_url) -%}
<form method="POST" action="{{ action }}" class="entity-toggle-form">
    <input type="hidden" name="next" value="{{ next_url }}">
    <button
        type="submit"
        class="btn btn-sm entity-toggle-btn {{ 'entity-toggle-btn--disable' if is_active else 'entity-toggle-btn--enable' }}"
    >
        {{ 'Tắt' if is_active else 'Bật' }}
    </button>
</form>
{%- endmacro %}

{% macro entity_state_checkbox(input_id, is_active) -%}
<div class="form-check entity-checkbox">
    <input class="form-check-input" type="checkbox" name="is_active" id="{{ input_id }}" {% if is_active %}checked{% endif %}>
    <label class="form-check-label" for="{{ input_id }}">
        Trạng thái: {{ 'Đang bật' if is_active else 'Tạm tắt' }}
    </label>
</div>
{%- endmacro %}
