<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập quản trị - ShopBot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
</head>

<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">🤖</div>
            <h1 class="login-title">ShopBot</h1>
            <p class="login-subtitle">Khu vực quản trị hệ thống</p>

            {% if error %}
            <div class="login-error">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="{{ post_url }}" class="login-form">
                <div class="form-group">
                    <label class="form-label" for="password">Mật khẩu quản trị</label>
                    <input
                        type="password"
                        name="password"
                        id="password"
                        class="form-control"
                        placeholder="Nhập mật khẩu..."
                        required
                        autofocus
                        autocomplete="current-password"
                    >
                </div>
                <button type="submit" class="btn btn-primary">Đăng nhập</button>
            </form>

            <div class="login-footer">
                Phiên đăng nhập được bảo vệ bằng xác thực phiên làm việc.
            </div>
        </div>
    </div>
</body>

</html>
